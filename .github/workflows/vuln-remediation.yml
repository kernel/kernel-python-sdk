name: Vulnerability Remediation

on:
  schedule:
    - cron: '0 3 * * 3'
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/vuln-remediation*'

permissions:
  contents: write
  pull-requests: write

jobs:
  remediate:
    uses: kernel/security-workflows/.github/workflows/vuln-remediation.yml@main
    with:
      setup-python: true
      python-version: '3.11'
    secrets: inherit
